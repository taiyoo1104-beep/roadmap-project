services:
  db:
    image: postgres:15
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: password

  backend:
    build: ./backend
    command: bin/rails server -b 0.0.0.0
    volumes:
      - ./backend:/rails
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/backend_development
    depends_on:
      - db
    env_file:
      - ./backend/.env

  # 👇 ここ！ services の下にスペース2つ入れて、db や backend と縦を揃えます
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3000" # ホスト(3001) -> コンテナ(3000)
    environment:
      - WATCHPACK_POLLING=true